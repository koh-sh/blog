name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm install

      - name: Run lint, type-check, and tests
        run: mise run ci

      - name: Setup Dart Sass
        uses: dw-labs-org/dart-sass-gha@v1

      - name: Build Hugo site
        run: hugo --minify
